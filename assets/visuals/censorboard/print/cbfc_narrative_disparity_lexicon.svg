<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <rect width="1800" height="1250" fill="#f8f2e8"/>
  <text x="90" y="95" font-family="Georgia, serif" font-size="46" fill="#201915">Disparity And Procedural Language Persistence</text>
  <text x="90" y="138" font-family="Arial, sans-serif" font-size="24" fill="#5a5048">Two inferences: unequal burden and durable command vocabulary</text>

  <text x="90" y="220" font-family="Arial" font-size="32" fill="#8e1f1b">A. Language disparity ratio against English baseline (73.57 s/cert)</text>
  <line x1="90" y1="560" x2="1680" y2="560" stroke="#5a5048" stroke-width="2"/>

  <text x="120" y="320" font-family="Arial" font-size="28" fill="#2f2824">Bhojpuri x3.65</text>
  <rect x="420" y="288" width="580" height="34" fill="#8e1f1b"/>

  <text x="120" y="390" font-family="Arial" font-size="28" fill="#2f2824">Bengali x3.09</text>
  <rect x="420" y="358" width="490" height="34" fill="#a43a2c"/>

  <text x="120" y="460" font-family="Arial" font-size="28" fill="#2f2824">Hindi x1.99</text>
  <rect x="420" y="428" width="315" height="34" fill="#c66a4e"/>

  <text x="120" y="530" font-family="Arial" font-size="28" fill="#2f2824">Urdu x12.70 (low n, caution)</text>
  <rect x="420" y="498" width="1020" height="34" fill="#6e1a19"/>

  <text x="90" y="655" font-family="Arial" font-size="32" fill="#8e1f1b">B. Procedural lexicon retention (muted + word + visuals)</text>

  <rect x="120" y="720" width="650" height="120" rx="14" fill="#fff8ef" stroke="#d4c7b6"/>
  <text x="160" y="785" font-family="Arial" font-size="34" fill="#2f2824">2018 total: 8,527</text>

  <rect x="860" y="720" width="650" height="120" rx="14" fill="#fff8ef" stroke="#d4c7b6"/>
  <text x="900" y="785" font-family="Arial" font-size="34" fill="#2f2824">2024 total: 6,112</text>

  <line x1="770" y1="780" x2="860" y2="780" stroke="#8e1f1b" stroke-width="5"/>
  <text x="730" y="760" font-family="Arial" font-size="24" fill="#8e1f1b">71.68% retained</text>

  <rect x="90" y="930" width="1620" height="230" rx="16" fill="#fff8ef" stroke="#d4c7b6"/>
  <text x="130" y="995" font-family="Arial" font-size="30" fill="#2f2824">Inference:</text>
  <text x="130" y="1045" font-family="Arial" font-size="28" fill="#2f2824">Censorship language remains institutionally procedural over time.</text>
  <text x="130" y="1090" font-family="Arial" font-size="28" fill="#2f2824">The archive speaks in command verbs and operational tokens, not dialogic justification.</text>
</svg>
