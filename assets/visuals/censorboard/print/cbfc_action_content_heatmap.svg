  <text x="520" y="335" font-family="Arial" font-size="28" fill="#fff">7582</text>
  <text x="720" y="335" font-family="Arial" font-size="28" fill="#fff">5097</text>
  <text x="920" y="335" font-family="Arial" font-size="28" fill="#fff">4876</text>
  <text x="1120" y="335" font-family="Arial" font-size="28" fill="#513d32">756</text>
  <text x="1330" y="335" font-family="Arial" font-size="28" fill="#513d32">497</text>

  <text x="525" y="525" font-family="Arial" font-size="28" fill="#513d32">149</text>
