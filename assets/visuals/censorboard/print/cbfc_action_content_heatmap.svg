<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <rect width="1600" height="1100" fill="#f6efe4"/>
  <text x="90" y="90" font-family="Georgia, serif" font-size="42" fill="#1f1a17">Action x Content Matrix of Cuts</text>
  <text x="90" y="130" font-family="Arial, sans-serif" font-size="22" fill="#5c534a">Computed from modification descriptions (keyword-coded content classes)</text>

