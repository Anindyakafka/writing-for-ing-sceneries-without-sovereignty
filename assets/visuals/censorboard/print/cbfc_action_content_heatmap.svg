  <text x="1110" y="220" font-family="Arial" font-size="24" fill="#2e2823">Religion</text>
  <text x="1310" y="220" font-family="Arial" font-size="24" fill="#2e2823">Political</text>

  <text x="180" y="340" font-family="Arial" font-size="26" fill="#2e2823">Deletion</text>
